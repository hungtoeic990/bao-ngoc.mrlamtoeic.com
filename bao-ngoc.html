<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open Sheet</title>

<style>
body{
  font-family: -apple-system, Arial;
  text-align:center;
  margin-top:120px;
}
button{
  font-size:20px;
  padding:16px 28px;
  border:none;
  border-radius:12px;
  background:#34A853;
  color:white;
}
</style>

<script>
function openSheet(){

  // Try open Google Sheets app
  window.location.href =
  "googlesheets://docs.google.com/spreadsheets/d/1q1mx8dkGyq12lIveJx6huxLmt2gZyziJkaC-ppl0xlU/edit";

  // fallback if app not installed
  setTimeout(function(){
    window.location.href =
    "https://docs.google.com/spreadsheets/d/1q1mx8dkGyq12lIveJx6huxLmt2gZyziJkaC-ppl0xlU/edit?usp=drivesdk";
  },1500);
}
</script>

</head>

<body>

<h2>Open Google Sheets</h2>
<p>Tap the button below</p>

<button onclick="openSheet()">
Open in Google Sheets App
</button>

</body>
</html>
